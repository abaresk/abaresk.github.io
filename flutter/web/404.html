<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Abaresk's Blog</title>
  <script>
    // GitHub Pages SPA redirect: preserve the path and query string
    // by encoding them into the URL as a query parameter, which
    // index.html will decode and restore via history.replaceState.
    var pathSegmentsToKeep = 0;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
